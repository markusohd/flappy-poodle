<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Poodle Flap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1a1a2e; overflow: hidden; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      touch-action: none;
    }
    canvas {
      display: block;
      /* Scale to fill the viewport while keeping the 400:600 ratio */
      width: min(400px, 100vw, calc(100svh * 400 / 600));
      height: auto;
      aspect-ratio: 400 / 600;
      border-radius: clamp(0px, 2vw, 8px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      touch-action: none;

<body>
<canvas id="game"></canvas>
<script>
// ---------------------------------------------------------------------------
// Constants
// ---------------------------------------------------------------------------
const W             = 400;
const H             = 600;
const FPS           = 60;
const GRAVITY       = 0.5;
const FLAP_STRENGTH = -9;
const MAX_FALL      = 10;
const PIPE_W        = 60;
const PIPE_GAP      = 185;
const PIPE_SPEED    = 3;
const PIPE_SPACING  = 220;
const PIPE_CAP_H    = 16;
const PIPE_CAP_PAD  = 4;
const BIRD_W        = 40;
const BIRD_H        = 30;
const BIRD_X        = 80;
const GROUND_H      = 80;

// ---------------------------------------------------------------------------
// Canvas setup
// ---------------------------------------------------------------------------
const canvas = document.getElementById("game");
canvas.width  = W;
canvas.height = H;
const ctx = canvas.getContext("2d");

// ---------------------------------------------------------------------------
// Poodle sprite (drawn once onto an offscreen canvas)
// ---------------------------------------------------------------------------
function makePoodleSprite() {
  const oc  = document.createElement("canvas");
  oc.width  = BIRD_W;
  oc.height = BIRD_H;
  const c   = oc.getContext("2d");

  // Helper: filled polygon
  function poly(pts, color) {
    c.beginPath();
    c.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) c.lineTo(pts[i][0], pts[i][1]);
    c.closePath();
    c.fillStyle = color;
    c.fill();
  }

  // Wings (behind body)
  poly([[6,17],[15,17],[12,3],[3,6]],   "#aac4f0");
  poly([[7,18],[16,18],[13,4],[4,7]],   "#ddeeff");
  poly([[19,17],[28,17],[32,6],[22,3]], "#aac4f0");
  poly([[20,18],[29,18],[33,7],[23,4]], "#ddeeff");

  // Tail pom-pom
  c.beginPath();
  c.arc(4, 20, 6, 0, Math.PI * 2);
  c.fillStyle = "#2d2d2d";
  c.fill();
  c.beginPath();
  c.arc(3, 19, 5, 0, Math.PI * 2);
  c.fillStyle = "#0f0f0f";
  c.fill();

  // Body
  c.beginPath();
  c.ellipse(15, 18, 13, 7, 0, 0, Math.PI * 2);
  c.fillStyle = "#2d2d2d";
  c.fill();
  c.beginPath();
  c.ellipse(14, 17, 12, 6, 0, 0, Math.PI * 2);
  c.fillStyle = "#0f0f0f";
  c.fill();

  // Head fluff — 8 circles in a ring
  const hx = 29, hy = 16;
  const offsets = [[7,0],[5,5],[0,7],[-5,5],[-7,0],[-5,-5],[0,-7],[5,-5]];
  for (const [dx, dy] of offsets) {
    c.beginPath();
    c.arc(hx + dx, hy + dy, 4, 0, Math.PI * 2);
    c.fillStyle = "#0f0f0f";
    c.fill();
  }

  // Head center
  c.beginPath();
  c.arc(hx, hy, 6, 0, Math.PI * 2);
  c.fillStyle = "#0f0f0f";
  c.fill();

  // Eye
  c.beginPath();
  c.arc(31, 11, 4, 0, Math.PI * 2);
  c.fillStyle = "#ffffff";
  c.fill();
  c.beginPath();
  c.arc(32, 11, 2, 0, Math.PI * 2);
  c.fillStyle = "#0a0a0a";
  c.fill();
  c.beginPath();
  c.arc(33, 10, 1, 0, Math.PI * 2);
  c.fillStyle = "#ffffff";
  c.fill();

  // Nose
  c.beginPath();
  c.arc(37, 17, 3, 0, Math.PI * 2);
  c.fillStyle = "#c85a5a";
  c.fill();
  c.beginPath();
  c.arc(37, 17, 2, 0, Math.PI * 2);
  c.fillStyle = "#963232";
  c.fill();

  return oc;
}

const POODLE_SPRITE = makePoodleSprite();

// ---------------------------------------------------------------------------
// Blanket sprite — apricot maltipoo
// ---------------------------------------------------------------------------
function makeMaltipooSprite() {
  const oc  = document.createElement("canvas");
  oc.width  = BIRD_W;
  oc.height = BIRD_H;
  const c   = oc.getContext("2d");

  function poly(pts, color) {
    c.beginPath();
    c.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) c.lineTo(pts[i][0], pts[i][1]);
    c.closePath();
    c.fillStyle = color;
    c.fill();
  }

  // Wings (same as Pillow — stylised, not breed-specific)
  poly([[6,17],[15,17],[12,3],[3,6]],   "#aac4f0");
  poly([[7,18],[16,18],[13,4],[4,7]],   "#ddeeff");
  poly([[19,17],[28,17],[32,6],[22,3]], "#aac4f0");
  poly([[20,18],[29,18],[33,7],[23,4]], "#ddeeff");

  // Floppy drop ears (drawn before body so body overlaps top of ears)
  c.beginPath(); c.ellipse(25, 23, 5, 9, 0.15, 0, Math.PI * 2);
  c.fillStyle = "#b8743e"; c.fill();
  c.beginPath(); c.ellipse(33, 22, 4, 8, -0.15, 0, Math.PI * 2);
  c.fillStyle = "#b8743e"; c.fill();

  // Tail — soft oval (not a tight pom like Pillow)
  c.beginPath(); c.ellipse(4, 19, 5, 4, -0.2, 0, Math.PI * 2);
  c.fillStyle = "#c8884a"; c.fill();
  c.beginPath(); c.ellipse(3, 18, 4, 3, -0.2, 0, Math.PI * 2);
  c.fillStyle = "#e8a85c"; c.fill();

  // Body
  c.beginPath(); c.ellipse(15, 18, 13, 7, 0, 0, Math.PI * 2);
  c.fillStyle = "#c8884a"; c.fill();
  c.beginPath(); c.ellipse(14, 17, 12, 6, 0, 0, Math.PI * 2);
  c.fillStyle = "#e8a85c"; c.fill();

  // Head fluff — loose wavy puffs (maltipoo style, not tight pom ring)
  const hx = 29, hy = 15;
  for (const [dx, dy] of [[-7,-1],[-5,-5],[-1,-7],[3,-6],[7,-3],[8,1],[6,5]]) {
    c.beginPath(); c.arc(hx + dx, hy + dy, 5, 0, Math.PI * 2);
    c.fillStyle = "#c8884a"; c.fill();
  }
  // Head face — rounder than Pillow's
  c.beginPath(); c.arc(hx, hy, 7, 0, Math.PI * 2);
  c.fillStyle = "#e8a85c"; c.fill();

  // Eye
  c.beginPath(); c.arc(31, 11, 4, 0, Math.PI * 2);
  c.fillStyle = "#ffffff"; c.fill();
  c.beginPath(); c.arc(32, 11, 2.5, 0, Math.PI * 2);
  c.fillStyle = "#3a1f08"; c.fill();   // dark brown iris
  c.beginPath(); c.arc(33, 10, 1, 0, Math.PI * 2);
  c.fillStyle = "#ffffff"; c.fill();

  // Nose — dark (maltipoo) not red like Pillow
  c.beginPath(); c.ellipse(37, 17, 3.5, 2.5, 0, 0, Math.PI * 2);
  c.fillStyle = "#1a1010"; c.fill();
  c.beginPath(); c.ellipse(37, 17, 2.5, 1.8, 0, 0, Math.PI * 2);
  c.fillStyle = "#2d1a0a"; c.fill();

  return oc;
}

const MALTIPOO_SPRITE = makeMaltipooSprite();

const CHAR_SPRITES = [POODLE_SPRITE, MALTIPOO_SPRITE];
const CHAR_NAMES   = ["Pillow", "Blanket"];

// ---------------------------------------------------------------------------
// Landing-screen pixel-art sprites (12×14 each, rendered at 7× scale)
// ---------------------------------------------------------------------------
function makePoodleLandingSprite() {
  // Pillow — black standard poodle
  // Bumpy poof on top = curly poodle fur; round pom ears separated by gaps on sides
  const oc = document.createElement("canvas");
  oc.width = 12; oc.height = 14;
  const c = oc.getContext("2d");
  const B = "#0f0f0f", W = "#ffffff", k = "#888888", p = "#ff6688", _ = null;
  const grid = [
    [_,B,_,B,_,B,_,B,_,B,_,_],  // bumpy poodle poof (5 curls)
    [_,B,B,B,B,B,B,B,B,B,B,_],  // poof base
    [_,B,B,B,B,B,B,B,B,B,B,_],  // head
    [B,B,B,B,B,B,B,B,B,B,B,B],  // pom ears extend out
    [B,_,B,W,W,B,B,W,W,B,_,B],  // eyes  (gap separates pom ears from face)
    [B,_,B,W,k,B,B,W,k,B,_,B],  // pupils
    [B,_,B,B,B,B,B,B,B,B,_,B],
    [B,_,B,B,p,p,B,B,B,B,_,B],  // nose
    [B,B,B,B,B,B,B,B,B,B,B,B],  // lower face rejoins
    [_,B,p,B,B,B,B,B,B,p,B,_],  // smile corners
    [_,B,B,p,p,p,p,p,p,B,B,_],  // smile
    [_,B,B,B,B,B,B,B,B,B,B,_],
    [_,_,B,B,B,B,B,B,B,B,_,_],
    [_,_,_,B,B,B,B,B,B,_,_,_],
  ];
  for (let row = 0; row < grid.length; row++)
    for (let col = 0; col < grid[row].length; col++)
      if (grid[row][col]) { c.fillStyle = grid[row][col]; c.fillRect(col, row, 1, 1); }
  return oc;
}

function makeMaltipooLandingSprite() {
  // Blanket — apricot maltipoo
  // Smooth rounded head (no curls); thick floppy hanging ears in darker apricot
  const oc = document.createElement("canvas");
  oc.width = 12; oc.height = 14;
  const c = oc.getContext("2d");
  const A = "#e8a85c", E = "#b8743e", W = "#ffffff", k = "#3a1f08",
        n = "#1a1010", p = "#cc4466", _ = null;
  const grid = [
    [_,_,A,A,A,A,A,A,A,A,_,_],  // smooth round head top (maltipoo ≠ bumpy)
    [_,A,A,A,A,A,A,A,A,A,A,_],
    [A,A,A,A,A,A,A,A,A,A,A,A],
    [E,E,A,A,A,A,A,A,A,A,E,E],  // thick floppy ears begin (darker apricot)
    [E,E,A,W,W,A,A,W,W,A,E,E],  // eyes + ears
    [E,E,A,W,k,A,A,W,k,A,E,E],  // pupils + ears
    [E,E,A,A,A,A,A,A,A,A,E,E],
    [E,E,A,A,n,n,A,A,A,A,E,E],  // nose + ears
    [E,E,A,A,A,A,A,A,A,A,E,E],  // ears continue down
    [_,E,p,A,A,A,A,A,A,p,E,_],  // smile corners, ears taper
    [_,_,A,p,p,p,p,p,p,A,_,_],  // smile
    [_,_,A,A,A,A,A,A,A,A,_,_],
    [_,_,_,A,A,A,A,A,A,_,_,_],
    [_,_,_,_,A,A,A,A,_,_,_,_],
  ];
  for (let row = 0; row < grid.length; row++)
    for (let col = 0; col < grid[row].length; col++)
      if (grid[row][col]) { c.fillStyle = grid[row][col]; c.fillRect(col, row, 1, 1); }
  return oc;
}

const POODLE_LANDING   = makePoodleLandingSprite();
const MALTIPOO_LANDING = makeMaltipooLandingSprite();

// ---------------------------------------------------------------------------
// Bird
// ---------------------------------------------------------------------------
class Bird {
  constructor(sprite) {
    this.x      = BIRD_X;
    this.y      = H / 2;
    this.vel    = 0;
    this.angle  = 0;
    this.sprite = sprite;
  }
  flap() { this.vel = FLAP_STRENGTH; }
  update() {
    this.vel   = Math.min(this.vel + GRAVITY, MAX_FALL);
    this.y    += this.vel;
    this.angle = Math.max(-30, Math.min(this.vel * 5, 90));
  }
  getRect() {
    return { x: this.x + 4, y: this.y + 4, w: BIRD_W - 8, h: BIRD_H - 8 };
  }
  draw() {
    ctx.save();
    ctx.translate(this.x + BIRD_W / 2, this.y + BIRD_H / 2);
    ctx.rotate(this.angle * Math.PI / 180);
    ctx.drawImage(this.sprite, -BIRD_W / 2, -BIRD_H / 2);
    ctx.restore();
  }
}

// ---------------------------------------------------------------------------
// Pipe
// ---------------------------------------------------------------------------
class Pipe {
  constructor(x) {
    this.x      = x;
    this.gap    = curGap;
    this.gapTop = Math.floor(Math.random() * (H - GROUND_H - this.gap - 60 - 120)) + 120;
    this.scored = false;
  }
  update() { this.x -= curSpeed; }
  isOffScreen() { return this.x + PIPE_W < 0; }
  getRects() {
    return [
      { x: this.x, y: 0,                      w: PIPE_W, h: this.gapTop },
      { x: this.x, y: this.gapTop + this.gap,  w: PIPE_W, h: H - this.gapTop - this.gap },
    ];
  }
  draw() {
    ctx.fillStyle = "#50a050";
    const [top, bot] = this.getRects();
    ctx.fillRect(top.x, top.y, top.w, top.h);
    ctx.fillRect(bot.x, bot.y, bot.w, bot.h);

    // Caps
    ctx.fillStyle = "#3c7a3c";
    ctx.fillRect(this.x - PIPE_CAP_PAD / 2, this.gapTop - PIPE_CAP_H,
                 PIPE_W + PIPE_CAP_PAD, PIPE_CAP_H);
    ctx.fillRect(this.x - PIPE_CAP_PAD / 2, this.gapTop + this.gap,
                 PIPE_W + PIPE_CAP_PAD, PIPE_CAP_H);
  }
}

// ---------------------------------------------------------------------------
// Asteroid (replaces Pipe in Outer Space)
// ---------------------------------------------------------------------------
class Asteroid {
  constructor(x) {
    this.x      = x;
    this.gap    = curGap;
    this.gapTop = Math.floor(Math.random() * (H - GROUND_H - this.gap - 80 - 100)) + 100;
    this.scored = false;
    this._seed  = Math.floor(Math.random() * 9999);
  }
  _hash(n) { return ((n * 1664525 + 1013904223) >>> 0) / 4294967296; }
  update() { this.x -= curSpeed; }
  isOffScreen() { return this.x + PIPE_W + 10 < 0; }
  getRects() {
    return [
      { x: this.x - 5, y: 0,                      w: PIPE_W + 10, h: this.gapTop },
      { x: this.x - 5, y: this.gapTop + this.gap,  w: PIPE_W + 10, h: H - this.gapTop - this.gap },
    ];
  }
  _drawRock(x, y, w, h, jagged) {
    const segs = 8, sw = w / segs;
    ctx.beginPath();
    if (jagged === "bottom") {
      ctx.moveTo(x, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+h);
      for (let i = segs; i >= 0; i--) {
        const jy = y + h - (this._hash(this._seed + i) * 18 + 4);
        ctx.lineTo(x + i*sw, jy);
      }
    } else {
      ctx.moveTo(x, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y);
      for (let i = segs; i >= 0; i--) {
        const jy = y + (this._hash(this._seed + i + 100) * 18 + 4);
        ctx.lineTo(x + i*sw, jy);
      }
    }
    ctx.closePath();
    ctx.fillStyle = "#7e7e88"; ctx.fill();
    ctx.strokeStyle = "#555560"; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = "rgba(0,0,0,0.18)";
    ctx.beginPath(); ctx.arc(x+w*0.35, y+h*0.45, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w*0.65, y+h*0.32, 3, 0, Math.PI*2); ctx.fill();
  }
  draw() {
    if (this.gapTop > 0) this._drawRock(this.x-5, 0, PIPE_W+10, this.gapTop, "bottom");
    const botY = this.gapTop + this.gap;
    const botH = H - botY;
    if (botH > 0) this._drawRock(this.x-5, botY, PIPE_W+10, botH, "top");
  }
}

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function drawText(text, size, x, y, center = true) {
  ctx.font = `bold ${size}px Arial, sans-serif`;
  ctx.textAlign    = center ? "center" : "left";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillText(text, x + 2, y + 2);
  ctx.fillStyle = "#ffffff";
  ctx.fillText(text, x, y);
}

// ---------------------------------------------------------------------------
// Audio (Web Audio API — all sounds synthesized, no external files)
// ---------------------------------------------------------------------------
const audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = audioCtx.createGain();
masterGain.gain.value = 1.0;
masterGain.connect(audioCtx.destination);

function resumeAudio() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Pillow (toy poodle) — sharp high "yip"
function playPillowBark() {
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.connect(g); g.connect(masterGain);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(1100, t);
  osc.frequency.exponentialRampToValueAtTime(700,  t + 0.05);
  osc.frequency.exponentialRampToValueAtTime(500,  t + 0.12);
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
  osc.start(t); osc.stop(t + 0.15);
}

// Blanket (maltipoo) — softer, rounder "woof"
function playBlanketBark() {
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.connect(g); g.connect(masterGain);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(380, t);
  osc.frequency.exponentialRampToValueAtTime(230, t + 0.10);
  osc.frequency.exponentialRampToValueAtTime(170, t + 0.22);
  g.gain.setValueAtTime(0.20, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  osc.start(t); osc.stop(t + 0.26);
}

function playBark() {
  resumeAudio();
  if (selectedChar === 0) playPillowBark();
  else playBlanketBark();
}

// Crash — Super Mario death jingle (NES-style square wave)
function playCrash() {
  resumeAudio();
  const t = audioCtx.currentTime;
  // Quick ascending pickup, then descending chromatic run
  const seq = [
    [659, 0.00, 0.07],  // E5
    [523, 0.08, 0.07],  // C5
    [392, 0.16, 0.08],  // G4  (brief rest before descent)
    [330, 0.30, 0.09],  // E4
    [311, 0.40, 0.09],  // Eb4
    [294, 0.50, 0.09],  // D4
    [277, 0.60, 0.09],  // Db4
    [262, 0.70, 0.09],  // C4
    [247, 0.80, 0.09],  // B3
    [233, 0.90, 0.09],  // Bb3
    [220, 1.00, 0.16],  // A3 — final fall
  ];
  for (const [freq, offset, dur] of seq) {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.connect(g); g.connect(masterGain);
    osc.type = 'square';
    osc.frequency.value = freq;
    const s = t + offset;
    g.gain.setValueAtTime(0.18, s);
    g.gain.exponentialRampToValueAtTime(0.001, s + dur);
    osc.start(s); osc.stop(s + dur + 0.01);
  }
}

// Background music — minimal C-major arpeggio loop, very soft
const BG_SEQ = [261.6, 329.6, 392.0, 329.6, 261.6, 329.6, 392.0, 329.6];
const BG_DUR = 0.45;   // seconds per note
const BG_VOL = 0.04;
let   bgPlaying = false;
let   bgTimer   = null;

function scheduleBgNote(freq, startTime) {
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.connect(g); g.connect(masterGain);
  osc.type = 'sine';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0,      startTime);
  g.gain.linearRampToValueAtTime(BG_VOL,  startTime + 0.05);
  g.gain.setValueAtTime(BG_VOL,           startTime + BG_DUR * 0.70);
  g.gain.linearRampToValueAtTime(0,       startTime + BG_DUR * 0.92);
  osc.start(startTime);
  osc.stop(startTime + BG_DUR);
}

function scheduleBgBar(startTime) {
  if (!bgPlaying) return;
  const barDur = BG_SEQ.length * BG_DUR;
  for (let i = 0; i < BG_SEQ.length; i++) {
    scheduleBgNote(BG_SEQ[i], startTime + i * BG_DUR);
  }
  // Re-schedule 100 ms before the bar ends so there's no gap
  bgTimer = setTimeout(() => scheduleBgBar(startTime + barDur),
                       (barDur - 0.1) * 1000);
}

function startBgMusic() {
  if (bgPlaying) return;
  bgPlaying = true;
  resumeAudio();
  scheduleBgBar(audioCtx.currentTime + 0.15);
}

function stopBgMusic() {
  bgPlaying = false;
  if (bgTimer) { clearTimeout(bgTimer); bgTimer = null; }
}

// ---------------------------------------------------------------------------
// World-progression background system
// ---------------------------------------------------------------------------
const WORLD_SIZE  = 75;
const TOD_SIZE    = 25;
const BLEND_WIN   = 5;
const SPACE_START = 375;
const WORLD_BASE_GAPS = [220, 190, 165, 145, 130, 0];
const WORLD_NAMES = ["Earth","Great Wall","Tokyo","Paris","Manila","Space"];

function lerp(a, b, t)    { return a + (b - a) * t; }
function lerpC(a, b, t)   { return [lerp(a[0],b[0],t)|0, lerp(a[1],b[1],t)|0, lerp(a[2],b[2],t)|0]; }
function toRgb([r,g,b])   { return `rgb(${r},${g},${b})`; }
function toRgba([r,g,b],a){ return `rgba(${r},${g},${b},${+a.toFixed(3)})`; }

const WORLD_COLS = [

function getSceneInfo() {
  const s = Math.max(score, 0);
  if (s >= SPACE_START) return { worldIdx:5, todPhase:0, nextTodPhase:0, todBlend:0, worldBlend:0, nextWorldIdx:5 };
  const worldIdx    = Math.floor(s / WORLD_SIZE);
  const withinWorld = s % WORLD_SIZE;
  const todPhase    = Math.floor(withinWorld / TOD_SIZE);
  const withinTod   = withinWorld % TOD_SIZE;
  let todBlend = 0, nextTodPhase = todPhase;
  if (withinTod >= TOD_SIZE - BLEND_WIN) {
    todBlend     = (withinTod - (TOD_SIZE - BLEND_WIN)) / BLEND_WIN;
    nextTodPhase = todPhase === 2 ? 0 : todPhase + 1;
  }
  let worldBlend = 0, nextWorldIdx = worldIdx;
  if (withinWorld >= WORLD_SIZE - BLEND_WIN) {
    worldBlend   = (withinWorld - (WORLD_SIZE - BLEND_WIN)) / BLEND_WIN;
    nextWorldIdx = Math.min(worldIdx + 1, 5);
  }
  return { worldIdx, todPhase, nextTodPhase, todBlend, worldBlend, nextWorldIdx };
}

function getPalForWorld(wIdx, tod, nextTod, t) {
  const tbl = WORLD_COLS[wIdx];
  const lc  = key => t === 0 ? tbl[key][tod] : lerpC(tbl[key][tod], tbl[key][nextTod], t);
  const nightAmt = t === 0 ? (tod===2?1:0) : nextTod===2?t : tod===2?1-t:0;
  const aftnAmt  = t === 0 ? (tod===1?1:0) : nextTod===1?t : tod===1?1-t:0;
  return { skyTop:lc('skyTop'), skyBot:lc('skyBot'), farMtn:lc('farMtn'), nearMtn:lc('nearMtn'),
           tree:lc('tree'), ground:lc('ground'), gndLine:lc('gndLine'), nightAmt, aftnAmt, worldIdx:wIdx };
}

function getSpacePal() {
  return { skyTop:[5,5,18], skyBot:[8,10,30], farMtn:[0,0,0], nearMtn:[0,0,0],
           tree:[0,0,0], ground:[72,72,78], gndLine:[52,52,60],
           nightAmt:1, aftnAmt:0, worldIdx:5, worldBlend:0, nextWorldIdx:5 };
}

function getPal() {
  const si = getSceneInfo();
  if (si.worldIdx === 5) return getSpacePal();
  const { worldIdx, todPhase, nextTodPhase, todBlend, worldBlend, nextWorldIdx } = si;
  const cur = getPalForWorld(worldIdx, todPhase, nextTodPhase, todBlend);
  if (worldBlend === 0) return { ...cur, worldBlend:0, nextWorldIdx };
  const ni  = nextWorldIdx === 5 ? 4 : nextWorldIdx;
  const nxt = getPalForWorld(ni, 0, 0, 0);
  const lk  = key => lerpC(cur[key], nxt[key], worldBlend);
  return { skyTop:lk('skyTop'), skyBot:lk('skyBot'), farMtn:lk('farMtn'), nearMtn:lk('nearMtn'),
           tree:lk('tree'), ground:lk('ground'), gndLine:lk('gndLine'),
           nightAmt:lerp(cur.nightAmt,nxt.nightAmt,worldBlend),
           aftnAmt:lerp(cur.aftnAmt,nxt.aftnAmt,worldBlend),
           worldIdx, worldBlend, nextWorldIdx };
}

function fillPoly(pts, color) {
  ctx.beginPath();
  pts.forEach(([x,y], i) => i ? ctx.lineTo(x,y) : ctx.moveTo(x,y));
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function drawSky(p) {
  const gY = H - GROUND_H;
  const grad = ctx.createLinearGradient(0, 0, 0, gY);
  grad.addColorStop(0, toRgb(p.skyTop));
  grad.addColorStop(1, toRgb(p.skyBot));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, gY);
}

function drawCelestials(p) {
  if (p.nightAmt > 0.01) {
    const now = Date.now() / 900;
    for (const [sx, sy, sr] of STARS) {
      const twinkle = 0.55 + 0.45 * Math.sin(now + sx * 0.05);
      ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fillStyle = toRgba([255,255,235], p.nightAmt * twinkle); ctx.fill();
    }
    ctx.save(); ctx.globalAlpha = p.nightAmt;
    ctx.beginPath(); ctx.arc(308, 68, 18, 0, Math.PI * 2);
    ctx.fillStyle = "#fffde0"; ctx.fill();
    ctx.beginPath(); ctx.arc(318, 63, 16, 0, Math.PI * 2);
    ctx.fillStyle = toRgb(p.skyTop); ctx.fill();
    ctx.restore();
  }
  if (p.nightAmt < 0.99) {
    const sx = lerp(330, 355, p.aftnAmt), sy = lerp(68, 155, p.aftnAmt);
    const sc = lerpC([255,228,80], [255,70,10], p.aftnAmt);
    ctx.save(); ctx.globalAlpha = 1 - p.nightAmt;
    const grd = ctx.createRadialGradient(sx, sy, 4, sx, sy, 38);
    grd.addColorStop(0, toRgba(sc, 0.65)); grd.addColorStop(1, toRgba(sc, 0));
    ctx.fillStyle = grd; ctx.fillRect(sx-38, sy-38, 76, 76);
    ctx.beginPath(); ctx.arc(sx, sy, 20, 0, Math.PI*2);
    ctx.fillStyle = toRgb(sc); ctx.fill(); ctx.restore();
  }
}

function drawClouds(p, worldBlend, nextWorldIdx) {
  if (p.nightAmt >= 0.99 || p.worldIdx > 1) return;
  let alpha = (1 - p.nightAmt) * 0.82;
  if (p.worldIdx === 1 && worldBlend > 0 && nextWorldIdx >= 2) alpha *= (1 - worldBlend);
  if (alpha < 0.01) return;
  const cc = lerpC([238,244,255], [255,192,120], p.aftnAmt);
  ctx.save(); ctx.globalAlpha = alpha;
  for (const cloud of CLOUDS)
    for (const [cx,cy,rx,ry] of cloud) {
      ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
      ctx.fillStyle = toRgb(cc); ctx.fill();
    }
  ctx.restore();
}

function drawEarth(p) {
  fillPoly(EARTH_FAR_PTS, toRgb(p.farMtn));
  fillPoly(EARTH_NEAR_PTS, toRgb(p.nearMtn));
  const gY = H - GROUND_H;
  for (const [tx,th,tw] of EARTH_TREES) {
    ctx.fillStyle = toRgb(p.tree);
    ctx.fillRect(tx - tw/2, gY - th*0.30, tw, th*0.30);
    [[1,0],[0.72,0.24]].forEach(([scale,yOff]) => {
      ctx.beginPath();
      ctx.moveTo(tx, gY - th*scale);
      ctx.lineTo(tx - th*0.44*scale, gY - th*0.28 + th*yOff);
      ctx.lineTo(tx + th*0.44*scale, gY - th*0.28 + th*yOff);
      ctx.closePath(); ctx.fill();
    });
  }
}

function drawGreatWall(p) {
  fillPoly(WALL_FAR_PTS, toRgb(p.farMtn));
  for (const [cx,by,h,lean] of WALL_TREES) {
    ctx.save(); ctx.translate(cx, by); ctx.rotate(lean * Math.PI / 180);
    ctx.fillStyle = toRgb(lerpC(p.tree, [50,35,15], 0.5));
    ctx.fillRect(-3, -h, 5, h);
    ctx.fillStyle = toRgb(p.tree);
    for (const [bx2,by2,rx,ry] of [[-8,-h+8,10,7],[4,-h+5,12,8],[0,-h-4,9,6]]) {
      ctx.beginPath(); ctx.ellipse(bx2,by2,rx,ry,0,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
  for (let i = 0; i < WALL_TOWERS.length; i++) {
    const [tcx,tby,tw,th] = WALL_TOWERS[i];
    const [rcx,rtipY,rhalf] = WALL_TOWER_ROOFS[i];
    ctx.fillStyle = toRgb(p.nearMtn);
    ctx.fillRect(tcx - tw/2, tby, tw, th);
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(tcx-3, tby+12, 6, 10); ctx.fillRect(tcx-3, tby+28, 6, 10);
    for (let l = 0; l < 2; l++) {
      const scale = 1 - l*0.35, yOff = l*14;
      ctx.fillStyle = toRgb(lerpC(p.nearMtn, [80,55,30], 0.45));
      ctx.beginPath(); ctx.moveTo(rcx, rtipY+yOff);
      ctx.lineTo(rcx - rhalf*scale, rtipY+yOff+16);
      ctx.lineTo(rcx + rhalf*scale, rtipY+yOff+16);
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.fillStyle = toRgb(p.nearMtn); ctx.fillRect(0, 430, W, 15);
  ctx.fillStyle = toRgb(lerpC(p.nearMtn, [200,180,140], 0.3));
  for (const [mx,mw] of WALL_MERLONS) ctx.fillRect(mx, WALL_MERLON_Y, mw, WALL_MERLON_H);
}

function drawTokyo(p) {

  ctx.fillStyle = toRgb(p.nearMtn);

function drawManila(p) {

  for (const [bx,by,bw,bh] of MANILA_BUILDINGS) ctx.fillRect(bx,by,bw,bh);
  for (const [pcx,pby,trunkH,frondSpan] of MANILA_PALMS) {
    const lean = (pcx % 60 < 30) ? -14 : 12;
    const ftx = pcx + lean*1.5, fty = pby - trunkH;
    ctx.strokeStyle = toRgb(lerpC(p.tree,[80,55,20],0.7)); ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(pcx,pby);
    ctx.quadraticCurveTo(pcx+lean, pby-trunkH*0.5, ftx, fty); ctx.stroke();
    ctx.strokeStyle = toRgb(p.tree); ctx.lineWidth = 2;
    for (let fi=0; fi<7; fi++) {
      const angle = (-180 + fi*30) * Math.PI / 180;
      ctx.beginPath(); ctx.moveTo(ftx,fty);
      ctx.lineTo(ftx + Math.cos(angle)*frondSpan, fty + Math.sin(angle)*frondSpan); ctx.stroke();
    }

}

function drawSpaceBg() {
  const gY = H - GROUND_H;
  ctx.fillStyle = "rgb(5,5,18)"; ctx.fillRect(0, 0, W, gY);
  for (const [ncx,ncy,nr,[r,g,b],a] of NEBULAE) {
    const grd = ctx.createRadialGradient(ncx,ncy,0,ncx,ncy,nr);
    grd.addColorStop(0, `rgba(${r},${g},${b},${a})`);
    grd.addColorStop(0.5, `rgba(${r},${g},${b},${+(a*0.4).toFixed(3)})`);
    grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grd; ctx.fillRect(ncx-nr, ncy-nr, nr*2, nr*2);
  }
  const now = Date.now() / 900;
  for (const [sx,sy,sr] of SPACE_STARS) {
    const alpha = sr >= 1.5 ? 0.6 + 0.4*Math.sin(now + sx*0.05) : 0.85;
    ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,255,235,${+alpha.toFixed(3)})`; ctx.fill();
  }
  const ep = SPACE_PLANET;
  const eg = ctx.createRadialGradient(ep.cx-10,ep.cy-10,4,ep.cx,ep.cy,ep.r);
  eg.addColorStop(0,"rgb(100,180,255)"); eg.addColorStop(0.4,"rgb(55,140,80)");
  eg.addColorStop(0.75,"rgb(30,100,180)"); eg.addColorStop(1,"rgb(15,50,100)");
  ctx.beginPath(); ctx.arc(ep.cx,ep.cy,ep.r,0,Math.PI*2); ctx.fillStyle=eg; ctx.fill();
  const rg = ctx.createRadialGradient(ep.cx,ep.cy,ep.r-4,ep.cx,ep.cy,ep.r+6);
  rg.addColorStop(0,"rgba(100,200,255,0)"); rg.addColorStop(1,"rgba(100,200,255,0.25)");
  ctx.beginPath(); ctx.arc(ep.cx,ep.cy,ep.r+6,0,Math.PI*2); ctx.fillStyle=rg; ctx.fill();
  const sm = SPACE_MOON;
  ctx.beginPath(); ctx.arc(sm.cx,sm.cy,sm.r,0,Math.PI*2);
  ctx.fillStyle="rgb(188,183,172)"; ctx.fill();
  ctx.fillStyle="rgba(0,0,0,0.18)";
  ctx.beginPath(); ctx.arc(sm.cx+5,sm.cy-4,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sm.cx-5,sm.cy+5,3,0,Math.PI*2); ctx.fill();
  fillPoly(SPACE_GROUND_PTS, "rgb(72,72,78)");
  ctx.strokeStyle="rgb(92,90,96)"; ctx.lineWidth=2;
  ctx.beginPath();
  SPACE_GROUND_PTS.slice(1,-2).forEach(([x,y],i) => i ? ctx.lineTo(x,y) : ctx.moveTo(x,y));
  ctx.stroke();
}

function drawWorldGeom(wIdx, p) {
  switch(wIdx) {
    case 0: drawEarth(p);     break;
    case 1: drawGreatWall(p); break;
    case 2: drawTokyo(p);     break;
    case 3: drawParis(p);     break;
    case 4: drawManila(p);    break;
  }
}

function drawBg() {
  const si = getSceneInfo();
  if (si.worldIdx === 5) { drawSpaceBg(); return; }
  const p = getPal();
  drawSky(p);
  drawCelestials(p);
  drawClouds(p, si.worldBlend, si.nextWorldIdx);
  if (si.worldBlend < 0.001) {
    drawWorldGeom(si.worldIdx, p);
  } else {
    ctx.save(); ctx.globalAlpha = 1 - si.worldBlend;
    drawWorldGeom(si.worldIdx, getPalForWorld(si.worldIdx, si.todPhase, si.nextTodPhase, si.todBlend));
    ctx.restore();
    ctx.save(); ctx.globalAlpha = si.worldBlend;
    const ni = si.nextWorldIdx === 5 ? 4 : si.nextWorldIdx;
    drawWorldGeom(ni, getPalForWorld(ni, 0, 0, 0));
    ctx.restore();
  }
}

// ---------------------------------------------------------------------------
// Game state
// ---------------------------------------------------------------------------
function isFirstVisit() { return !localStorage.getItem("poodleFlapVisited"); }
function markVisited()   { localStorage.setItem("poodleFlapVisited", "1"); }
let state = isFirstVisit() ? "landing" : "select";
let bird, pipes, score, frame, highScore;
let curSpeed, curGap, lastSpeedScore, lastGapScore, lastWorldIdx;
let selectedChar = 0;  // 0 = Pillow, 1 = Blanket
highScore = 0;

function reset() {
  bird           = new Bird(CHAR_SPRITES[selectedChar]);
  pipes          = [];
  score          = 0;
  frame          = 0;
  curSpeed       = PIPE_SPEED;
  curGap         = PIPE_GAP;
  lastSpeedScore = 0;
  lastGapScore   = 0;
  lastWorldIdx   = 0;
}
reset();

// ---------------------------------------------------------------------------
// Input
// ---------------------------------------------------------------------------
function onKeyAction() {
  if (state === "landing") {
    markVisited(); state = "select";
  } else if (state === "select") {
    reset(); state = "start";
  } else if (state === "start") {
    state = "playing";
    startBgMusic();
  } else if (state === "playing") {
    bird.flap();
    playBark();
  } else if (state === "dead") {
    stopBgMusic();
    state = "select";
  }
}

// Select-screen box geometry (must match drawSelectScreen)
const LANDING_PLAY_BTN = { x: W/2 - 75, y: 340, w: 150, h: 50 };
const SEL_BOX_W = 130, SEL_BOX_H = 120;
const SEL_CENTERS = [[110, 235], [290, 235]];

function onMouseDown(mx, my) {
  if (state === "landing") {
    const b = LANDING_PLAY_BTN;
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      markVisited(); state = "select";
    }
    return;
  }
  if (state === "select") {
    for (let i = 0; i < 2; i++) {
      const [cx, cy] = SEL_CENTERS[i];
      if (mx >= cx - SEL_BOX_W / 2 && mx <= cx + SEL_BOX_W / 2 &&
          my >= cy - SEL_BOX_H / 2 && my <= cy + SEL_BOX_H / 2) {
        selectedChar = i;
        reset();
        state = "start";
        return;
      }
    }
    return;
  }
  onKeyAction();
}

document.addEventListener("keydown", e => {
  if (e.code === "Space")      { e.preventDefault(); onKeyAction(); }
  if (e.code === "ArrowLeft"  && state === "select") { selectedChar = 0; }
  if (e.code === "ArrowRight" && state === "select") { selectedChar = 1; }
  if (e.code === "KeyC"       && state === "dead")   { state = "select"; }
});

canvas.addEventListener("mousedown", e => {
  const r  = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (W / r.width);
  const my = (e.clientY - r.top)  * (H / r.height);
  onMouseDown(mx, my);
});

canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  const r  = canvas.getBoundingClientRect();
  const mx = (e.touches[0].clientX - r.left) * (W / r.width);
  const my = (e.touches[0].clientY - r.top)  * (H / r.height);
  onMouseDown(mx, my);
}, { passive: false });

// ---------------------------------------------------------------------------
// Update
// ---------------------------------------------------------------------------
function update() {
  if (state !== "playing") return;

  frame++;
  bird.update();

  const si = getSceneInfo();
  const interval = Math.floor(PIPE_SPACING / curSpeed);
  if (frame > 120 && frame % interval === 0) {
    if (si.worldIdx === 5) pipes.push(new Asteroid(W));
    else                   pipes.push(new Pipe(W));
  }

  for (const pipe of pipes) {
    pipe.update();
    if (!pipe.scored && pipe.x + PIPE_W < BIRD_X) {
      pipe.scored = true;
      score++;
      // World change → reset gap to that world's baseline
      const newSi = getSceneInfo();
      if (newSi.worldIdx !== lastWorldIdx) {
        lastWorldIdx = newSi.worldIdx;
        if (newSi.worldIdx < 5) curGap = WORLD_BASE_GAPS[newSi.worldIdx];
      }
      // Speed: increase every 50 points
      if (score % 50 === 0 && score !== lastSpeedScore) {
        lastSpeedScore = score;
        curSpeed = Math.min(curSpeed + 0.5, 7);
      }
      // Gap: tighten every 30 points
      if (score % 30 === 0 && score !== lastGapScore) {
        lastGapScore = score;
        curGap = Math.max(curGap - 10, 115);
      }
    }
  }

  pipes = pipes.filter(p => !p.isOffScreen());

  if (checkCollision()) {
    highScore = Math.max(highScore, score);
    state = "dead";
    stopBgMusic();
    playCrash();
  }
}

function checkCollision() {
  const br = bird.getRect();
  if (bird.y + BIRD_H >= H - GROUND_H) return true;
  if (bird.y < 0) return true;
  for (const pipe of pipes) {
    for (const r of pipe.getRects()) {
      if (rectsOverlap(br, r)) return true;
    }
  }
  return false;
}

// ---------------------------------------------------------------------------
// Character select screen
// ---------------------------------------------------------------------------
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x,     y + r);
  ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

function drawLandingScreen() {
  drawBg();
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, 0, W, H);

  // Title
  drawText("POODLE", 54, W/2, 95,  true, "#ffd700");
  drawText("FLAP",   54, W/2, 155, true, "#ffd700");

  // Pixelated character sprites — 12×14 px scaled 7×
  const SCALE = 7, SW = 12 * SCALE, SH = 14 * SCALE;
  const leftX  = W/2 - SW - 10;
  const rightX = W/2 + 10;
  const charY  = 188;
  const b1 = Math.sin(Date.now() / 320) *  7;
  const b2 = Math.sin(Date.now() / 280 + Math.PI) * 7;

  ctx.save();
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(MALTIPOO_LANDING, leftX,  charY + b1, SW, SH);
  ctx.drawImage(POODLE_LANDING,   rightX, charY + b2, SW, SH);
  ctx.restore();

  drawText("Blanket", 15, leftX  + SW/2, charY + SH + 16, true, "rgba(255,255,255,0.8)");
  drawText("Pillow",  15, rightX + SW/2, charY + SH + 16, true, "rgba(255,255,255,0.8)");

  // Play button
  const btn = LANDING_PLAY_BTN;
  ctx.fillStyle = "#ffd700";
  roundRect(btn.x, btn.y, btn.w, btn.h, 12);
  ctx.fill();
  ctx.fillStyle = "#1a1a2e";
  ctx.font = "bold 24px Arial, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("PLAY", W/2, btn.y + btn.h/2);

  ctx.fillStyle = "rgba(255,255,255,0.45)";
  ctx.font = "13px Arial, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("tap or press space", W/2, H - 38);
}

function drawSelectScreen() {
  drawBg();  // animated background (score=0 → morning palette)

  // Dim overlay
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(0, 0, W, H);

  drawText("CHOOSE YOUR CHARACTER", 26, W / 2, 95);

  for (let i = 0; i < 2; i++) {
    const [cx, cy] = SEL_CENTERS[i];
    const bx = cx - SEL_BOX_W / 2;
    const by = cy - SEL_BOX_H / 2;

    // Box fill
    ctx.fillStyle = i === selectedChar ? "rgba(255,215,0,0.12)" : "rgba(255,255,255,0.07)";
    roundRect(bx, by, SEL_BOX_W, SEL_BOX_H, 12);
    ctx.fill();

    // Box border
    ctx.strokeStyle = i === selectedChar ? "#ffd700" : "rgba(255,255,255,0.28)";
    ctx.lineWidth   = i === selectedChar ? 3 : 1.5;
    roundRect(bx, by, SEL_BOX_W, SEL_BOX_H, 12);
    ctx.stroke();

    // Sprite preview at 2.5×
    const sw = BIRD_W * 2.5, sh = BIRD_H * 2.5;
    ctx.drawImage(CHAR_SPRITES[i], cx - sw / 2, by + 14, sw, sh);

    // Character name
    drawText(CHAR_NAMES[i], 21, cx, by + SEL_BOX_H - 13);
  }

  drawText("Tap a character to play", 18, W / 2, 382);
}

// ---------------------------------------------------------------------------
// Draw
// ---------------------------------------------------------------------------
function draw() {
  if (state === "landing") { drawLandingScreen(); return; }
  if (state === "select")  { drawSelectScreen();  return; }

  // Sky + mountains + trees (everything behind pipes)
  drawBg();

  // Pipes
  for (const pipe of pipes) pipe.draw();

  // Ground (dynamic color)
  const pal = getPal();
  ctx.fillStyle = toRgb(pal.ground);
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  if (pal.worldIdx !== 5) {
    ctx.fillStyle = toRgb(pal.gndLine);
    ctx.fillRect(0, H - GROUND_H, W, 4);
  }

  // Bird
  bird.draw();

  // Score + world name during play
  if (state === "playing") {
    drawText(String(score), 52, W / 2, 60);
    const si = getSceneInfo();
    drawText(WORLD_NAMES[si.worldIdx], 18, W / 2, 102);
  }

  // Overlay
  if (state === "start" || state === "dead") {
    ctx.fillStyle = "rgba(0,0,0,0.30)";
    ctx.fillRect(0, 0, W, H);

    if (state === "start") {
      drawText("POODLE FLAP", 36, W / 2, H / 2 - 40);
      drawText("Tap to start", 22, W / 2, H / 2 + 20);
    } else {
      drawText("GAME OVER",           36, W / 2, H / 2 - 60);
      drawText(`Score: ${score}`,     22, W / 2, H / 2 + 10);
      drawText(`Best:  ${highScore}`, 22, W / 2, H / 2 + 46);
      drawText("Tap to continue",     20, W / 2, H / 2 + 96);
    }
  }
}

// ---------------------------------------------------------------------------
// Loop
// ---------------------------------------------------------------------------
let last = 0;
const STEP = 1000 / FPS;

function loop(ts) {
  if (ts - last >= STEP) {
    last = ts;
    update();
    draw();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
